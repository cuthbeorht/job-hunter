apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: job-hunter
  labels:
    app.kubernetes.io/component: migration
spec:
  # Automatically clean up the completed Job pod after 10 minutes
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ${BACKEND_IMAGE}
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: job-hunter-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
